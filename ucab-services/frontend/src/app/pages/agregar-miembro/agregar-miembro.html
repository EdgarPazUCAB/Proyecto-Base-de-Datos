<div class="bg-background text-on-background min-h-screen flex flex-col">
  <header class="bg-green-600 dark:bg-green-800 text-white font-inter tracking-tight font-semibold docked full-width top-0 border-b border-green-700 dark:border-green-900 shadow-sm transition-all duration-200 ease-in-out">
    <div class="flex justify-between items-center w-full px-6 h-16 max-w-[1280px] mx-auto">
      <div class="flex items-center gap-8">
        <span class="text-xl font-black text-white uppercase tracking-wider">UCAB SERVICES</span>
        <nav class="hidden md:flex gap-6 h-full items-center">
          <a class="text-green-50 hover:text-white transition-colors hover:bg-green-700 dark:hover:bg-green-900 rounded-sm px-3 py-2" href="#">Dashboard</a>
          <a class="text-green-50 hover:text-white transition-colors hover:bg-green-700 dark:hover:bg-green-900 rounded-sm px-3 py-2" href="#">Services</a>
          <a class="text-green-50 hover:text-white transition-colors hover:bg-green-700 dark:hover:bg-green-900 rounded-sm px-3 py-2" href="#">Requests</a>
          <a class="border-b-2 border-white text-white pb-1 hover:bg-green-700 dark:hover:bg-green-900 rounded-sm px-3 py-2" href="#">Profile</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <button class="p-2 hover:bg-green-700 dark:hover:bg-green-900 rounded-full transition-colors flex items-center justify-center">
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <button class="p-2 hover:bg-green-700 dark:hover:bg-green-900 rounded-full transition-colors flex items-center justify-center">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow w-full max-w-container-max mx-auto px-gutter py-xl flex flex-col gap-lg">
    <div class="flex flex-col gap-sm">
      <h1 class="font-h1 text-h1 text-on-surface">Añadir Miembro</h1>
      <p class="font-body-lg text-body-lg text-on-surface-variant">Ingrese los datos personales y académicos del nuevo miembro del sistema.</p>
    </div>

    <div class="bg-surface border border-outline-variant rounded-xl shadow-sm p-lg">
      <form class="flex flex-col gap-xl">
        <fieldset class="flex flex-col gap-md">
          <legend class="font-h3 text-h3 text-primary mb-sm">Datos Personales</legend>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="primer_nombre">Primer Nombre *</label>
              <input class="w-full bg-surface border border-outline-variant rounded px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="primer_nombre" name="primer_nombre" required="" type="text">
            </div>
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="segundo_nombre">Segundo Nombre</label>
              <input class="w-full bg-surface border border-outline-variant rounded px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="segundo_nombre" name="segundo_nombre" type="text">
            </div>
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="primer_apellido">Primer Apellido *</label>
              <input class="w-full bg-surface border border-outline-variant rounded px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="primer_apellido" name="primer_apellido" required="" type="text">
            </div>
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="segundo_apellido">Segundo Apellido</label>
              <input class="w-full bg-surface border border-outline-variant rounded px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="segundo_apellido" name="segundo_apellido" type="text">
            </div>
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="cedula">Número de Cédula *</label>
              <input class="w-full bg-surface border border-outline-variant rounded px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="cedula" name="cedula" required="" type="text">
            </div>
          </div>
        </fieldset>

        <fieldset class="flex flex-col gap-md">
          <legend class="font-h3 text-h3 text-primary mb-sm">Datos Institucionales</legend>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="rol">Rol *</label>
              <select class="w-full bg-surface border border-outline-variant rounded px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all appearance-none cursor-pointer" id="rol" name="rol" required="">
                <option disabled="" selected="" value="">Seleccione un rol</option>
                <option value="profesor">Profesor</option>
                <option value="estudiante">Estudiante</option>
                <option value="administrativo">Administrativo</option>
              </select>
            </div>
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="escuela">Escuela *</label>
              <select class="w-full bg-surface border border-outline-variant rounded px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all appearance-none cursor-pointer" id="escuela" name="escuela" required="">
                <option disabled="" selected="" value="">Seleccione una escuela</option>
                <option value="ing_informatica">Ingeniería Informática</option>
                <option value="derecho">Derecho</option>
                <option value="comunicacion">Comunicación Social</option>
              </select>
            </div>
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="semestre">Semestre (Solo Estudiantes)</label>
              <input class="w-full bg-surface border border-outline-variant rounded px-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="semestre" max="10" min="1" name="semestre" type="number">
            </div>
            <div class="flex flex-col gap-xs">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="tarjeta_tai">Número de Tarjeta TAI *</label>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">credit_card</span>
                <input class="w-full bg-surface border border-outline-variant rounded pl-xl pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container transition-all" id="tarjeta_tai" name="tarjeta_tai" required="" type="text">
              </div>
            </div>
          </div>
        </fieldset>

        <div class="flex justify-end items-center gap-md pt-lg border-t border-outline-variant mt-sm">
          <button class="px-lg py-sm rounded border border-outline-variant bg-surface text-secondary font-body-md text-body-md font-medium hover:bg-surface-container transition-colors focus:outline-none focus:ring-2 focus:ring-outline-variant" type="button">
            Cancelar
          </button>
          <button class="px-lg py-sm rounded bg-primary text-on-primary font-body-md text-body-md font-medium hover:bg-primary-fixed-dim transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container flex items-center gap-xs shadow-sm" type="submit">
            <span class="material-symbols-outlined text-[20px]">person_add</span>
            Añadir Miembro
          </button>
        </div>
      </form>
    </div>
  </main>

  <nav class="bg-white dark:bg-gray-900 text-green-600 dark:text-green-400 text-[11px] font-medium font-inter w-full border-t rounded-t-none border-gray-200 dark:border-gray-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] active:scale-95 transition-transform fixed bottom-0 left-0 z-50 flex justify-around items-center px-4 py-2 md:hidden">
    <button class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 p-2 rounded w-16">
      <span class="material-symbols-outlined mb-1">dashboard</span>
      Home
    </button>
    <button class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 p-2 rounded w-16">
      <span class="material-symbols-outlined mb-1">inventory_2</span>
      Catalog
    </button>
    <button class="flex flex-col items-center justify-center text-green-600 dark:text-green-400 font-bold bg-green-50 dark:bg-green-900/20 rounded-lg px-3 py-1 w-16">
      <span class="material-symbols-outlined mb-1">person</span>
      Account
    </button>
  </nav>

  <footer class="bg-gray-50 dark:bg-gray-950 text-gray-600 dark:text-gray-400 text-sm font-inter w-full border-t border-gray-200 dark:border-gray-800 flat no-shadows transition-opacity duration-150 py-8 px-6 flex flex-col md:flex-row justify-between items-center max-w-[1280px] mx-auto mt-auto mb-16 md:mb-0">
    <div class="font-bold text-green-700 dark:text-green-500 mb-4 md:mb-0">
      © 2024 UCAB Services. Academic Excellence.
    </div>
    <div class="flex gap-6">
      <a class="text-gray-500 hover:text-green-600 transition-colors" href="#">Privacy Policy</a>
      <a class="text-gray-500 hover:text-green-600 transition-colors" href="#">Terms of Service</a>
      <a class="text-gray-500 hover:text-green-600 transition-colors" href="#">Help Desk</a>
    </div>
  </footer>
</div>
