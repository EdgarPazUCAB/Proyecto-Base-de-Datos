<header class="bg-primary shadow-sm docked full-width top-0 z-50">
  <div class="flex justify-between items-center w-full px-lg py-sm max-w-container-max mx-auto">
    <div class="flex items-center gap-xl">
      <span class="font-h3 text-h3 font-bold text-on-primary">UCAB SERVICES</span>
      <nav class="hidden md:flex gap-lg">
        <a
          routerLink="/dashboard"
          routerLinkActive="!text-on-primary !border-on-primary font-bold"
          class="text-on-primary/80 border-b-2 border-transparent hover:text-on-primary hover:border-on-primary pb-1 font-body-md text-body-md hover:bg-primary-container/10 transition-all cursor-pointer active:opacity-80"
        >
          Dashboard
        </a>

        <a
          routerLink="/catalogo-servicios"
          routerLinkActive="!text-on-primary !border-on-primary font-bold"
          class="text-on-primary/80 border-b-2 border-transparent hover:text-on-primary hover:border-on-primary pb-1 font-body-md text-body-md hover:bg-primary-container/10 transition-all cursor-pointer active:opacity-80"
        >
          Services
        </a>

        <a
          routerLink="/solicitar-servicio"
          routerLinkActive="!text-on-primary !border-on-primary font-bold"
          class="text-on-primary/80 border-b-2 border-transparent hover:text-on-primary hover:border-on-primary pb-1 font-body-md text-body-md hover:bg-primary-container/10 transition-all cursor-pointer active:opacity-80"
        >
          Requests
        </a>
        
        <a
          routerLink="/pago"
          routerLinkActive="!text-on-primary !border-on-primary font-bold"
          class="text-on-primary/80 border-b-2 border-transparent hover:text-on-primary hover:border-on-primary pb-1 font-body-md text-body-md hover:bg-primary-container/10 transition-all cursor-pointer active:opacity-80"
        >
          Pagos
        </a>
        
        <a
          routerLink="/profile"
          routerLinkActive="!text-on-primary !border-on-primary font-bold"
          class="text-on-primary/80 border-b-2 border-transparent hover:text-on-primary hover:border-on-primary pb-1 font-body-md text-body-md hover:bg-primary-container/10 transition-all cursor-pointer active:opacity-80"
        >
          Profile
        </a>
      </nav>
    </div>

    <div class="flex items-center gap-md text-on-primary">
      <span class="font-bold font-body-md mr-2">Hola, {{ nombreUsuario }}</span>

      <button
        class="hover:bg-primary-container/10 p-sm rounded-full transition-all cursor-pointer active:opacity-80"
      >
        <span class="material-symbols-outlined">notifications</span>
      </button>

      <div class="relative">
        <button
          (click)="toggleMenu()"
          class="hover:bg-primary-container/10 p-sm rounded-full transition-all cursor-pointer active:opacity-80"
        >
          <span class="material-symbols-outlined">settings</span>
        </button>

        <div
          *ngIf="isMenuOpen"
          class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50 border border-gray-200"
        >
          <a
            routerLink="/profile"
            (click)="isMenuOpen = false"
            class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 cursor-pointer"
          >
            Configuración
          </a>
          <hr class="border-gray-200 my-1" />
          <button
            (click)="cerrarSesion()"
            class="w-full text-left block px-4 py-2 text-sm text-red-600 hover:bg-red-50 cursor-pointer font-semibold"
          >
            Cerrar Sesión
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
