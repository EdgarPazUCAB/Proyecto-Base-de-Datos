spring.application.name=ucab-services

# ============================================================
# Conexión a PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ucab_services_db
spring.datasource.username=postgres
spring.datasource.password=COLOCA TU CLAVE AQUI
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
# IMPORTANTE: usamos "validate" (no "update" ni "create") porque
# las tablas YA existen — las creamos a mano con ucabservices_completo.sql,
# que incluye constraints, triggers y funciones que Hibernate no sabe
# replicar. Si Hibernate intentara gestionar el esquema, podría romper
# o ignorar todo eso. "validate" solo verifica que las entidades Java
# coincidan con las tablas reales, sin modificar nada.
#
# Por ahora, mientras NO tengamos ninguna entidad @Entity creada,
# lo dejamos en "none" (no hay nada que validar todavía). En cuanto
# creemos la primera entidad (Miembro), lo cambiamos a "validate".
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Nota: Hibernate 7+ detecta el dialecto de PostgreSQL automáticamente,
# por eso no se especifica spring.jpa.properties.hibernate.dialect aquí
# (forzarlo genera un warning innecesario sin aportar nada).

# Evita que Hibernate intente abrir conexión en el arranque antes de tiempo
spring.jpa.open-in-view=false

# ============================================================
# Servidor
# ============================================================
server.port=8080

# ============================================================
# CORS (para que Angular en localhost:4200 pueda llamar al backend)
# Esto lo configuraremos más a fondo cuando hagamos el primer
# controlador; por ahora dejamos la base.
# ============================================================